name: Auto Merge Claude Branch to Master

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Merge to master
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merging $BRANCH into master"

          # Fetch all branches
          git fetch origin master

          # Switch to master
          git checkout master

          # Merge the claude branch
          git merge --no-ff "origin/$BRANCH" -m "Auto merge: $BRANCH → master

          Triggered by push to $BRANCH
          Commit: ${{ github.sha }}"

          # Push to master
          git push origin master

          echo "Successfully merged $BRANCH into master"
